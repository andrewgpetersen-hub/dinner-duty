<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Dinner Duty" />
  <meta name="theme-color" content="#1a1a2e" />
  <title>Dinner Duty</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0f0e17;
      --surface: #1a1933;
      --gold: #f5c842;
      --text: #fffffe;
      --muted: rgba(255,255,255,0.45);
      --radius: 20px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100dvh;
      padding: env(safe-area-inset-top, 16px) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(91,134,229,0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(232,69,69,0.07) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 440px;
      margin: 0 auto;
      padding: 28px 20px 60px;
    }

    header {
      text-align: center;
      margin-bottom: 28px;
    }

    .app-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      font-weight: 900;
      letter-spacing: -0.5px;
      line-height: 1;
      background: linear-gradient(135deg, #fff 30%, var(--gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .app-subtitle {
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 6px;
    }

    .date-badge {
      display: inline-block;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 40px;
      padding: 6px 16px;
      font-size: 0.82rem;
      color: var(--muted);
      margin-top: 14px;
    }

    /* Cards */
    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 24px;
    }

    .card {
      border-radius: var(--radius);
      padding: 20px 16px 18px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.15s ease;
    }

    .card:active { transform: scale(0.96); }

    .card::before {
      content: '';
      position: absolute;
      top: -30%; right: -20%;
      width: 80%; height: 80%;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
    }

    .card::after {
      content: '✎';
      position: absolute;
      top: 10px; right: 12px;
      font-size: 0.75rem;
      opacity: 0.4;
    }

    .card:nth-child(1) { background: linear-gradient(135deg, #e84545, #c0392b); }
    .card:nth-child(2) { background: linear-gradient(135deg, #f5a623, #e67e22); }
    .card:nth-child(3) { background: linear-gradient(135deg, #2ecc71, #27ae60); }
    .card:nth-child(4) { background: linear-gradient(135deg, #5b86e5, #3b5fc0); }

    .card-chore {
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.75;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .card-emoji {
      font-size: 2rem;
      display: block;
      margin-bottom: 8px;
      line-height: 1;
    }

    .card-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1.1;
    }

    .card.rotating {
      animation: cardFlip 0.4s ease;
    }

    @keyframes cardFlip {
      0%   { transform: scale(1); opacity: 1; }
      40%  { transform: scale(0.92) translateY(-4px); opacity: 0.6; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    .btn {
      flex: 1;
      border: none;
      border-radius: 50px;
      padding: 15px 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .btn:active { transform: scale(0.96); }

    .btn-rotate {
      background: linear-gradient(135deg, var(--gold), #e6a800);
      color: #1a1a00;
      box-shadow: 0 6px 24px rgba(245,200,66,0.3);
    }

    .btn-log {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.14);
    }

    .rotate-icon { font-size: 1.1rem; display: inline-block; }
    .rotate-icon.spinning { animation: spin 0.5s ease; }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* History */
    .history-section {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .history-title {
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .history-list { list-style: none; }

    .history-item {
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .history-item:last-child { border-bottom: none; }

    .history-row-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .history-date { color: var(--muted); font-size: 0.78rem; }

    .history-note {
      font-size: 0.7rem;
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 2px 8px;
      color: rgba(255,255,255,0.5);
    }

    .history-assignments { display: flex; gap: 5px; flex-wrap: wrap; }

    .history-tag {
      background: rgba(255,255,255,0.07);
      border-radius: 6px;
      padding: 2px 7px;
      font-size: 0.72rem;
      white-space: nowrap;
    }

    .empty-history {
      color: var(--muted);
      font-size: 0.85rem;
      text-align: center;
      padding: 8px 0;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      padding: 12px 24px;
      border-radius: 40px;
      font-size: 0.88rem;
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
      z-index: 200;
      white-space: nowrap;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Edit Sheet */
    .sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 150;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .sheet-overlay.open { opacity: 1; pointer-events: all; }

    .sheet {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #1e1d35;
      border-radius: 24px 24px 0 0;
      padding: 0 20px calc(env(safe-area-inset-bottom, 0px) + 28px);
      z-index: 160;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
      max-width: 440px;
      margin: 0 auto;
    }

    .sheet.open { transform: translateY(0); }

    .sheet-handle {
      width: 36px; height: 4px;
      background: rgba(255,255,255,0.2);
      border-radius: 4px;
      margin: 14px auto 20px;
    }

    .sheet-kid-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .sheet-label {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .chore-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    .chore-option {
      background: rgba(255,255,255,0.06);
      border: 2px solid transparent;
      border-radius: 14px;
      padding: 14px 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.95rem;
      font-weight: 500;
      transition: background 0.15s, border-color 0.15s;
    }

    .chore-option:active { transform: scale(0.97); }

    .chore-option.selected {
      border-color: var(--gold);
      background: rgba(245,200,66,0.1);
    }

    .chore-option-emoji { font-size: 1.4rem; }

    .sheet-actions { display: flex; gap: 10px; }

    .sheet-btn {
      flex: 1;
      border: none;
      border-radius: 50px;
      padding: 15px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .sheet-btn-cancel { background: rgba(255,255,255,0.07); color: var(--muted); }
    .sheet-btn-save   { background: linear-gradient(135deg, var(--gold), #e6a800); color: #1a1a00; }
  </style>
</head>
<body>

<div class="app">
  <header>
    <div class="app-title">Dinner Duty</div>
    <div class="app-subtitle">Chore Rotation</div>
    <div class="date-badge" id="todayDate"></div>
  </header>

  <div class="cards" id="cardsGrid"></div>

  <div class="btn-row">
    <button class="btn btn-rotate" onclick="rotate()">
      <span class="rotate-icon" id="rotateIcon">↻</span> Rotate
    </button>
    <button class="btn btn-log" onclick="logTonight()">
      📋 Log Tonight
    </button>
  </div>

  <div class="history-section">
    <div class="history-title">Recent History</div>
    <ul class="history-list" id="historyList"></ul>
  </div>
</div>

<!-- Edit Sheet -->
<div class="sheet-overlay" id="overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-kid-name" id="sheetKidName"></div>
  <div class="sheet-label">Tap to change chore</div>
  <div class="chore-options" id="choreOptions"></div>
  <div class="sheet-actions">
    <button class="sheet-btn sheet-btn-cancel" onclick="closeSheet()">Cancel</button>
    <button class="sheet-btn sheet-btn-save" onclick="saveEdit()">Save</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const KIDS   = ['Jackson', 'Emmry', 'Grant', 'Preston'];
  const CHORES = [
    { name: 'Table',  emoji: '🍽️' },
    { name: 'Floor',  emoji: '🧹' },
    { name: 'Trash',  emoji: '🗑️' },
    { name: 'Dishes', emoji: '🫧' },
  ];

  function loadState() {
    try {
      const s = localStorage.getItem('dinnerDuty');
      if (s) return JSON.parse(s);
    } catch(e) {}
    return { assignments: [0,1,2,3], history: [] };
  }

  function saveState() {
    localStorage.setItem('dinnerDuty', JSON.stringify(state));
  }

  let state = loadState();
  let editKidIndex = null;
  let editSelected = null;

  /* ── Render cards ── */
  function renderCards() {
    const grid = document.getElementById('cardsGrid');
    grid.innerHTML = '';
    KIDS.forEach((kid, i) => {
      const chore = CHORES[state.assignments[i]];
      const card  = document.createElement('div');
      card.className = 'card';
      card.id = `card-${i}`;
      card.onclick = () => openEdit(i);
      card.innerHTML = `
        <div class="card-chore">${chore.name}</div>
        <span class="card-emoji">${chore.emoji}</span>
        <div class="card-name">${kid}</div>
      `;
      grid.appendChild(card);
    });
  }

  /* ── Render history ── */
  function formatDate(d) {
    return new Date(d).toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
  }

  function renderHistory() {
    const list   = document.getElementById('historyList');
    const recent = [...state.history].reverse().slice(0, 6);
    if (!recent.length) {
      list.innerHTML = '<div class="empty-history">No history yet.</div>';
      return;
    }
    list.innerHTML = recent.map(entry => {
      const tags = KIDS.map((kid, i) =>
        `<span class="history-tag">${kid}: ${CHORES[entry.assignments[i]].name}</span>`
      ).join('');
      const noteHtml = entry.note ? `<span class="history-note">${entry.note}</span>` : '';
      return `
        <li class="history-item">
          <div class="history-row-top">
            <span class="history-date">${formatDate(entry.date)}</span>
            ${noteHtml}
          </div>
          <div class="history-assignments">${tags}</div>
        </li>`;
    }).join('');
  }

  /* ── Rotate ── */
  function rotate() {
    state.assignments = state.assignments.map(a => (a + 1) % CHORES.length);
    saveState();

    KIDS.forEach((_, i) => {
      const card = document.getElementById(`card-${i}`);
      if (card) {
        setTimeout(() => {
          card.classList.add('rotating');
          card.addEventListener('animationend', () => card.classList.remove('rotating'), { once: true });
        }, i * 60);
      }
    });

    const icon = document.getElementById('rotateIcon');
    icon.classList.add('spinning');
    icon.addEventListener('animationend', () => icon.classList.remove('spinning'), { once: true });

    setTimeout(() => { renderCards(); renderHistory(); }, 280);
    showToast('Chores rotated! ↻');
  }

  /* ── Log Tonight ── */
  function logTonight() {
    const todayStr  = new Date().toDateString();
    const lastEntry = state.history[state.history.length - 1];
    if (lastEntry && new Date(lastEntry.date).toDateString() === todayStr) {
      showToast('Already logged today ✓');
      return;
    }
    state.history.push({
      date: new Date().toISOString(),
      assignments: [...state.assignments],
    });
    saveState();
    renderHistory();
    showToast('Tonight logged! 📋');
  }

  /* ── Edit sheet ── */
  function openEdit(kidIndex) {
    editKidIndex = kidIndex;
    editSelected = state.assignments[kidIndex];
    document.getElementById('sheetKidName').textContent = KIDS[kidIndex];

    const opts = document.getElementById('choreOptions');
    opts.innerHTML = CHORES.map((c, ci) => `
      <div class="chore-option ${ci === editSelected ? 'selected' : ''}"
           onclick="selectChore(${ci})">
        <span class="chore-option-emoji">${c.emoji}</span>
        <span>${c.name}</span>
      </div>
    `).join('');

    document.getElementById('overlay').classList.add('open');
    document.getElementById('sheet').classList.add('open');
  }

  function selectChore(ci) {
    editSelected = ci;
    document.querySelectorAll('.chore-option').forEach((el, i) => {
      el.classList.toggle('selected', i === ci);
    });
  }

  function closeSheet() {
    document.getElementById('overlay').classList.remove('open');
    document.getElementById('sheet').classList.remove('open');
    editKidIndex = null;
    editSelected = null;
  }

  function saveEdit() {
    if (editKidIndex === null) return;
    const oldChore = CHORES[state.assignments[editKidIndex]].name;
    state.assignments[editKidIndex] = editSelected;
    saveState();
    closeSheet();
    renderCards();
    const newChore = CHORES[editSelected].name;
    showToast(`${KIDS[editKidIndex]}: ${oldChore} → ${newChore}`);
  }

  /* ── Toast ── */
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2600);
  }

  /* ── Init ── */
  document.getElementById('todayDate').textContent = new Date().toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric'
  });

  renderCards();
  renderHistory();
</script>
</body>
</html>
